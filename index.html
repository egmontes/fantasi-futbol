    // ── FLOATING TABLE HEADER ──────────────────────────────────────────────
  let _fhScrollContainer = null;

  function initFloatingHeader(tableId) {
    const table = document.getElementById(tableId);
    if (!table) return;
    const outer = (() => { let el = table.parentElement; while(el && !el.classList.contains('table-outer')) el = el.parentElement; return el; })();
    const thead = table.querySelector('thead');
    if (!thead || !outer) return;

    const fh = document.getElementById('floating-header');
    const fhLeft = document.getElementById('fh-left');
    const fhRightTable = document.getElementById('fh-right-table');
    const fhRow = document.getElementById('floating-header-row');

    // Get real ths
    const realThs = Array.from(thead.querySelectorAll('th'));
    if (realThs.length < 2) return;

    // Build LEFT section — fixed # and Manager columns as plain divs
    fhLeft.innerHTML = '';
    const leftCols = realThs.slice(0, 2);
    leftCols.forEach((th, i) => {
      const div = document.createElement('div');
      div.style.cssText = `display:flex;align-items:center;padding:8px 10px;font-size:11px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;background:var(--bg2);border-bottom:1px solid var(--border);box-sizing:border-box;`;
      div.textContent = th.textContent;
      if (th.dataset.col) div.addEventListener('click', () => th.click());
      fhLeft.appendChild(div);
    });

    // Build RIGHT section — remaining columns in a scrollable table
    fhRow.innerHTML = '';
    const tr = document.createElement('tr');
    realThs.slice(2).forEach((th, i) => {
      const clone = th.cloneNode(true);
      if (th.dataset.col) clone.addEventListener('click', () => th.click());
      tr.appendChild(clone);
    });
    fhRow.appendChild(tr);

    function sync() {
      const toggleBar = document.getElementById('standings-toggle-bar');
      const weeklyToggleBar = document.getElementById('weekly-toggle-bar');
      const gwBar = document.querySelector('.gw-bar');
      const tabsBottom =
        (weeklyToggleBar && weeklyToggleBar.style.display !== 'none' ? weeklyToggleBar.getBoundingClientRect().bottom : 0) ||
        (toggleBar && toggleBar.style.display !== 'none' ? toggleBar.getBoundingClientRect().bottom : 0) ||
        (gwBar && !gwBar.classList.contains('hidden') ? gwBar.getBoundingClientRect().bottom : 0) ||
        document.querySelector('.tabs')?.getBoundingClientRect().bottom || 157;
      const theadRect = thead.getBoundingClientRect();
      const outerRect = outer.getBoundingClientRect();

      if (theadRect.bottom < tabsBottom) {
        const fhHeight = realThs[0].getBoundingClientRect().height || 36;

        fh.style.top = tabsBottom + 'px';
        fh.style.left = outerRect.left + 'px';
        fh.style.right = (window.innerWidth - outerRect.right) + 'px';
        fh.style.height = fhHeight + 'px';
        fh.style.overflow = 'hidden';

        // Size left fixed columns
        let leftWidth = 0;
        leftCols.forEach((th, i) => {
          const w = th.getBoundingClientRect().width;
          fhLeft.children[i].style.width = w + 'px';
          fhLeft.children[i].style.height = fhHeight + 'px';
          leftWidth += w;
        });
        fhLeft.style.width = leftWidth + 'px';

        // Right section fills full width, table starts at leftWidth via transform offset
        const rightDiv = fhRightTable.parentElement;
        const leftWidthCeil = Math.ceil(leftWidth);
        rightDiv.style.position = 'absolute';
        rightDiv.style.left = Math.max(0, leftWidthCeil - 1) + 'px';
        rightDiv.style.right = '0';
        rightDiv.style.top = '0';
        rightDiv.style.bottom = '0';
        rightDiv.style.overflow = 'hidden';

        // Sync widths for right columns
        const rightThs = realThs.slice(2);
        tr.querySelectorAll('th').forEach((th, i) => {
          if (rightThs[i]) th.style.width = rightThs[i].getBoundingClientRect().width + 'px';
        });

        // Sync horizontal scroll for right section only
        fhRightTable.style.transform = 'translateX(-' + outer.scrollLeft + 'px)';

        fh.classList.add('visible');
      } else {
        fh.classList.remove('visible');
      }
    }

    function syncScroll() {
      if (!fh.classList.contains('visible')) return;
      fhRightTable.style.transform = 'translateX(-' + outer.scrollLeft + 'px)';
    }

    if (_fhScrollContainer) {
      _fhScrollContainer.removeEventListener('scroll', _fhScrollContainer._syncScroll);
    }
    _fhScrollContainer = outer;
    outer._syncScroll = syncScroll;
    outer.addEventListener('scroll', syncScroll, { passive: true });
    window.addEventListener('scroll', sync, { passive: true });
    window.addEventListener('resize', sync, { passive: true });
    window.addEventListener('touchmove', sync, { passive: true });

    sync();
  }

  // ── DYNAMIC STICKY OFFSETS ──────────────────────────────────────────────
  function updateStickyOffsets() {
    const header = document.querySelector('.site-header');
    const callout = document.getElementById('gw-callout');
    const gwBar = document.querySelector('.gw-bar');
    const tabs = document.querySelector('.tabs');
    if (!header || !gwBar || !tabs) return;

    const headerH = header.offsetHeight;
    const calloutH = callout ? callout.offsetHeight : 0;
    const tabsH = tabs.offsetHeight;
    const gwBarH = (gwBar && !gwBar.classList.contains('hidden')) ? gwBar.offsetHeight : 0;

    document.documentElement.style.setProperty('--header-h', headerH + 'px');
    document.documentElement.style.setProperty('--sticky-tabs-top', (headerH + calloutH) + 'px');
    document.documentElement.style.setProperty('--sticky-gw-bar-top', (headerH + calloutH + tabsH) + 'px');
    document.documentElement.style.setProperty('--gwbar-h', gwBarH + 'px');
    const toggleBar = document.getElementById('standings-toggle-bar');
    const toggleBarH = (toggleBar && toggleBar.style.display !== 'none') ? toggleBar.offsetHeight : 0;
    const weeklyToggleBar = document.getElementById('weekly-toggle-bar');
    const weeklyToggleBarH = (weeklyToggleBar && weeklyToggleBar.style.display !== 'none') ? weeklyToggleBar.offsetHeight : 0;


    // standings toggle bar sits right below the tabs (no gw-bar on standings)
    const toggleTop = headerH + calloutH + tabsH;
    document.documentElement.style.setProperty('--sticky-toggle-top', toggleTop + 'px');
    const gwBarBottom = headerH + calloutH + tabsH + gwBarH;
    document.documentElement.style.setProperty('--sticky-gw-bar-bottom', gwBarBottom + 'px');

    const contentTop = headerH + calloutH + tabsH + gwBarH + toggleBarH + weeklyToggleBarH;
    document.documentElement.style.setProperty('--sticky-thead-top', contentTop + 'px');
    const finalContentTop = contentTop + 4;
    document.documentElement.style.setProperty('--content-top', finalContentTop + 'px');
    // Also set directly on the container so it takes effect immediately
    const container = document.querySelector('.container');
    if (container) container.style.paddingTop = finalContentTop + 'px';
  }

  window.addEventListener('resize', () => {
    updateStickyOffsets();
    // Re-run after a frame to catch any reflow from resize
    requestAnimationFrame(updateStickyOffsets);
  }, { passive: true });

    html += '<div id="weekly-generate-section" style="display:' + (saved ? 'none' : 'block') + ';">';
    html += '<div style="display:flex;gap:10px;align-items:center;margin-bottom:1rem;flex-wrap:wrap;"><button class="btn btn-primary" id="weekly-prepare-prompt-btn">Prepare GW' + gw + ' prompt →</button><span id="weekly-prepare-confirm" style="font-size:13px;color:var(--text3);display:none;"></span></div>';
    html += '<div id="weekly-prompt-preview-area" style="display:none;margin-bottom:1.5rem;"><label style="font-size:12px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:8px;">Prompt ready — select all and copy</label><textarea id="weekly-prompt-preview" readonly style="width:100%;min-height:120px;background:var(--bg2);color:var(--text2);border:1px solid var(--border2);border-radius:8px;padding:12px;font-family:var(--font-mono);font-size:12px;line-height:1.5;resize:vertical;"></textarea><div style="display:flex;gap:10px;margin-top:8px;"><button class="btn btn-primary" id="weekly-copy-prompt-btn">Copy to clipboard</button><span id="weekly-copy-confirm" style="font-size:13px;color:var(--green);display:none;">✓ Copied!</span></div></div>';
    html += '<div style="margin-bottom:1.5rem;"><label style="font-size:12px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:8px;">Paste recap here</label><textarea id="weekly-recap-paste" placeholder="Paste the recap from Claude here..." style="width:100%;min-height:220px;background:var(--bg2);color:var(--text);border:1px solid var(--border2);border-radius:8px;padding:12px;font-family:var(--font-body);font-size:14px;line-height:1.6;resize:vertical;">' + esc(saved || '') + '</textarea><div style="display:flex;gap:10px;margin-top:10px;"><button class="btn btn-primary" id="weekly-save-recap-btn">Save recap</button><button class="btn" id="weekly-clear-recap-btn" style="' + (saved ? '' : 'display:none') + '">Clear</button></div></div>';
    html += '</div>';
    html += '<div style="margin-top:3rem;padding-top:1rem;border-top:1px solid var(--border);"><button id="weekly-toggle-instructions-btn" style="background:none;border:none;cursor:pointer;padding:0;font-size:11px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.06em;display:flex;align-items:center;gap:4px;">▸ How to use</button><div id="weekly-instructions-section" style="display:none;margin-top:10px;"><p style="font-size:13px;color:var(--text3);line-height:1.6;margin:0;">Copy the prompt below, paste it into <a href="https://claude.ai" target="_blank" style="color:var(--green)">claude.ai</a>, then paste the response back here. Hitting <strong style="color:var(--text2);">Save recap</strong> will display it and automatically download a file — drag it into your <code style="font-family:var(--font-mono);font-size:12px;color:var(--green);">recaps/</code> folder and push to GitHub.</p></div></div>';

    container.innerHTML = html;

    if (saved) {
      const temp = document.createElement('div');
      temp.id = 'recap-display';
      document.body.appendChild(temp);
      renderRecapDisplay(gw, saved);
      const displayDiv = document.getElementById('weekly-recap-display');
      if (displayDiv) displayDiv.innerHTML = temp.innerHTML;
      document.body.removeChild(temp);
    }

    document.getElementById('weekly-toggle-generate-btn').addEventListener('click', () => {
      const sec = document.getElementById('weekly-generate-section');
      const btn = document.getElementById('weekly-toggle-generate-btn');
      const open = sec.style.display !== 'none';
      sec.style.display = open ? 'none' : 'block';
      if (saved) btn.textContent = (open ? '↩ ' : '↪ ') + generateLabel;
    });

    document.getElementById('weekly-toggle-instructions-btn').addEventListener('click', () => {
      const sec = document.getElementById('weekly-instructions-section');
      const btn = document.getElementById('weekly-toggle-instructions-btn');
      const open = sec.style.display !== 'none';
      sec.style.display = open ? 'none' : 'block';
      btn.textContent = (open ? '▸' : '▾') + ' How to use';
    });

    document.getElementById('weekly-prepare-prompt-btn').addEventListener('click', async () => {
      const btn = document.getElementById('weekly-prepare-prompt-btn');
      const status = document.getElementById('weekly-prepare-confirm');
      if (btn.disabled) return;
      
      // Get current GW from dropdown (in case it changed since tab setup)
      const gwVal = document.getElementById('gw-select').value;
      const currentGW = parseInt(gwVal) || state.latestGW;
      
      btn.disabled = true; btn.textContent = 'Fetching player data...';
      status.textContent = 'Fetching picks & transfers...'; status.style.display = 'inline';
      try {
        const prompt = await buildPrompt(currentGW);
        document.getElementById('weekly-prompt-preview').value = prompt;
        document.getElementById('weekly-prompt-preview-area').style.display = 'block';
        status.textContent = '✓ Ready to copy!'; btn.textContent = 'Refresh prompt →';
        document.getElementById('weekly-prompt-preview').select();
      } catch(e) { status.textContent = '✗ Failed: ' + e.message; }
      btn.disabled = false;
    });

    document.getElementById('weekly-copy-prompt-btn').addEventListener('click', () => {
      const ta = document.getElementById('weekly-prompt-preview');
      if (!ta || !ta.value) return;
      navigator.clipboard.writeText(ta.value).then(() => {
        const c = document.getElementById('weekly-copy-confirm');
        c.style.display = 'inline'; setTimeout(() => c.style.display = 'none', 2500);
      });
    });

    document.getElementById('weekly-save-recap-btn').addEventListener('click', () => {
      const text = document.getElementById('weekly-recap-paste').value.trim();
      if (!text) return;
      localStorage.setItem('recap-gw-' + gw, text);
      let displayDiv = document.getElementById('weekly-recap-display');
      if (!displayDiv) {
        displayDiv = document.createElement('div');
        displayDiv.id = 'weekly-recap-display';
        displayDiv.style.marginBottom = '2rem';
        container.prepend(displayDiv);
      }
      const temp = document.createElement('div');
      temp.id = 'recap-display';
      document.body.appendChild(temp);
      renderRecapDisplay(gw, text);
      displayDiv.innerHTML = temp.innerHTML;
      document.body.removeChild(temp);
      document.getElementById('weekly-clear-recap-btn').style.display = 'inline-block';
      const season = 2025;
      const gwPadded = String(gw).padStart(2, '0');
      const filename = season + '-gw' + gwPadded + '.txt';
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
      const btn = document.getElementById('weekly-save-recap-btn');
      btn.textContent = '✓ Saved & downloaded ' + filename;
      setTimeout(() => btn.textContent = 'Save recap', 3000);
    });

    document.getElementById('weekly-clear-recap-btn').addEventListener('click', () => {
      localStorage.removeItem('recap-gw-' + gw);
      document.getElementById('weekly-recap-paste').value = '';
      const d = document.getElementById('weekly-recap-display');
      if (d) d.innerHTML = '';
      document.getElementById('weekly-clear-recap-btn').style.display = 'none';
    });
  }
  // ── END WEEKLY VIEW TOGGLE ────────────────────────────────────────────────

  // GW CHANGE
  document.getElementById('gw-select').addEventListener('change', e => {
    const active = document.querySelector('.tab-btn.active').dataset.tab;
    setHashState(active, e.target.value);
    if (active === 'weekly') {
      const val = e.target.value;
      const gw = parseInt(val) || state.latestGW;
      // Update toggle labels
      const tableBtn = document.getElementById('weekly-toggle-table');
      const recapBtn = document.getElementById('weekly-toggle-recap');
      if (tableBtn) tableBtn.textContent = 'GW' + gw + ' League Table';
      if (recapBtn) recapBtn.textContent = 'GW' + gw + ' Recap';
      // Reset recap so it reloads for new GW
      _weeklyRecapGW = null;
      // Switch back to table view on GW change
      switchWeeklyView('table');
      if (val === 'preview') renderPreview();
      else if (val === 'live') renderLive();
      else renderWeekly(parseInt(val)).catch(console.error);
    }
    if (active === 'recap') setupRecapTab();
  });

  // REFRESH
  document.getElementById('btn-refresh').addEventListener('click', async () => {
    const btn = document.getElementById('btn-refresh');
    btn.disabled = true;
    btn.textContent = 'Refreshing...';
    state.gwHistory = {};
    state.managers = [];
    state.workingProxy = null;
    try {
      // Re-fetch bootstrap to pick up any new gameweeks
      document.getElementById('page-loader-text').textContent = 'Loading league data...';
      const bootstrap = await fetchFPL('bootstrap-static/');
      state.bootstrap = bootstrap;
      bootstrap.elements.forEach(p => { state.bootstrapPlayers[p.id] = p.web_name; });
      const finished = bootstrap.events.filter(e => e.finished || e.data_checked);
      const newLatest = finished.length > 0 ? finished[finished.length - 1].id : 1;

      // Rebuild GW dropdown if a new gameweek has appeared
      if (newLatest !== state.latestGW) {
        state.latestGW = newLatest;
        const gwSel = document.getElementById('gw-select');
        gwSel.innerHTML = '';
        for (let i = state.latestGW; i >= 1; i--) {
          const opt = document.createElement('option');
          opt.value = i;
          opt.textContent = 'GW ' + i;
          if (i === state.latestGW) opt.selected = true;
          gwSel.appendChild(opt);
        }
      }

      document.getElementById('page-loader-text').textContent = 'Loading managers...';
      await loadLeague();
      await loadAllHistory(true); // force refresh, bypass cache
      document.getElementById('page-loader-text').textContent = 'Almost ready...';
      await loadGuinnessDebts();
      document.getElementById('header-meta').textContent = '';
      // Rebuild dropdown in case GW state changed
      const gwSel = document.getElementById('gw-select');
      const currentVal = gwSel.value;
      gwSel.innerHTML = '';
      for (let i = state.latestGW; i >= 1; i--) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = 'GW ' + i;
        if (String(i) === currentVal) opt.selected = true;
        gwSel.appendChild(opt);
      }
      // Don't add live GW to selector while in progress
      if (state.showPreview) {
        const prevOpt = document.createElement('option');
        prevOpt.value = 'preview';
        prevOpt.textContent = 'GW ' + state.nextGW + ' Preview';
        if (currentVal === 'preview') prevOpt.selected = true;
        gwSel.appendChild(prevOpt);
      }

      loadLastUpdated();
      renderStandings();
      const refreshVal = gwSel.value;
      if (refreshVal === 'preview') renderPreview();
      else if (refreshVal === 'live') renderLive();
      else renderWeekly(parseInt(refreshVal));
    } catch (e) {
      document.getElementById('standings-content').innerHTML =
        `<div class="error-state">Refresh failed.<small>${e.message}</small></div>`;
    }
    btn.disabled = false;
    btn.textContent = '↺ Refresh';
  });

  // Set sticky offsets as early as possible
  document.addEventListener('DOMContentLoaded', () => {
    updateStickyOffsets();
  });
  init();
</script>
</body>
</html>
